<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stretto Assembly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'brand-primary': '#7dd3fc',
              'brand-secondary': '#1d4ed8',
              'brand-accent': '#f59e0b',
              'gray-light': '#f8fafc',
              'gray-medium': '#64748b',
              'gray-dark': '#1e293b',
              'gray-darker': '#0f172a'
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-in-out',
              'slide-up': 'slideUp 0.5s ease-in-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-gray-darker text-gray-light antialiased">

</html>
